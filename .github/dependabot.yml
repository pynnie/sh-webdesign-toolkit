# Eigene Dependabot-Config des Toolkits. Dieses Repo hat kein package.json
# (nur CI/Deploy-YAML) → KEIN npm-Ecosystem, sonst scheitert der Dependabot-Lauf.
# Die Kopiervorlage für Site-Repos (inkl. npm) liegt in templates/dependabot.yml.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
