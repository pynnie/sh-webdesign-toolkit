# Kopiervorlage für Site-Repos → .github/dependabot.yml
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      # eslint-plugin-react (gebündelt in eslint-config-next) ist noch nicht
      # ESLint-10-kompatibel — Major-Bumps erst nach Ökosystem-Support wieder zulassen
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
    groups:
      npm-patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-major:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
    groups:
      github-actions:
        patterns:
          - "*"
