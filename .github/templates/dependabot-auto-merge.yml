name: Dependabot auto-merge

# GitHub Native Auto-Merge requires GitHub Pro on private repos.
# Instead: merge directly after the CI workflow completes successfully.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              core.info(`No open PR for branch ${branch}, skipping.`);
              return;
            }

            const pr = prs[0];

            if (pr.user.login !== 'dependabot[bot]') {
              core.info(`Skipping merge for non-Dependabot PR #${pr.number}.`);
              return;
            }

            if (pr.draft) {
              core.info(`Skipping draft PR #${pr.number}.`);
              return;
            }

            if (pr.mergeable === false) {
              core.setFailed(`PR #${pr.number} is not mergeable (conflicts?).`);
              return;
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
            });

            core.info(`Merged Dependabot PR #${pr.number}.`);
