name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: pynnie/sh-webdesign-toolkit/.github/workflows/ci-next.yml@v1
    with:
      run_smoke_tests: true
    secrets: inherit

  merge-dependabot:
    needs: ci
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Merge Dependabot PR and trigger deploy
        uses: actions/github-script@v9
        with:
          script: |
            const base = context.payload.pull_request.base.ref;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
            });
            // A merge performed with GITHUB_TOKEN does not emit a push event,
            // so the deploy workflow must be dispatched explicitly on the base
            // branch. Krüger uses 'deploy-strato-ftps.yml' instead of 'deploy.yml'.
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: base,
            });
