name: Deploy preview static Next.js export

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for build
        type: string
        default: "22"
      build_env_json:
        description: Optional JSON object of env vars for the build step
        type: string
        default: ""
      target_branch:
        description: Branch to publish preview export to
        type: string
        default: preview
      webhook_var:
        description: Repository variable name containing the preview webhook URL
        type: string
        default: PREVIEW_DEPLOY_WEBHOOK_URL
      webhook_skip_if_empty:
        description: Skip webhook call when URL variable is unset
        type: boolean
        default: false
      webhook_payload_branch_key:
        description: JSON key for preview branch in webhook payload
        type: string
        default: preview_branch
      disable_jekyll:
        description: Create out/.nojekyll before publish
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Apply build environment
        if: inputs.build_env_json != ''
        run: |
          echo '${{ inputs.build_env_json }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Install
        run: npm ci

      - name: Build (Next.js export)
        run: npm run build

      - name: Disable Jekyll
        if: inputs.disable_jekyll
        run: touch out/.nojekyll

      - name: Publish to preview branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ inputs.target_branch }}
          folder: out
          clean: true

      - name: Call preview deploy webhook
        if: success()
        env:
          WEBHOOK_URL: ${{ vars[inputs.webhook_var] }}
          WEBHOOK_SKIP_IF_EMPTY: ${{ inputs.webhook_skip_if_empty }}
          PAYLOAD_BRANCH_KEY: ${{ inputs.webhook_payload_branch_key }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          payload=$(printf '{"repo":"%s","source_branch":"%s","%s":"%s","sha":"%s"}' \
            "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" \
            "${PAYLOAD_BRANCH_KEY}" "${TARGET_BRANCH}" \
            "${GITHUB_SHA}")
          # Inlined webhook caller with retry/backoff (no private-repo checkout needed)
          if [ -z "${WEBHOOK_URL:-}" ]; then
            if [ "${WEBHOOK_SKIP_IF_EMPTY:-false}" = "true" ]; then
              echo "WEBHOOK_URL not set, skipping webhook."
              exit 0
            fi
            echo "WEBHOOK_URL required"
            exit 1
          fi

          MAX_ATTEMPTS="${WEBHOOK_MAX_ATTEMPTS:-5}"
          wait_seconds="${WEBHOOK_INITIAL_WAIT_SECONDS:-15}"
          CONNECT_TIMEOUT="${WEBHOOK_CONNECT_TIMEOUT:-30}"
          MAX_TIME="${WEBHOOK_MAX_TIME:-120}"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Webhook attempt ${attempt}/${MAX_ATTEMPTS}..."
            if curl --fail-with-body -sS -X POST \
              --connect-timeout "$CONNECT_TIMEOUT" \
              --max-time "$MAX_TIME" \
              -H 'Content-Type: application/json' \
              -d "$payload" \
              "$WEBHOOK_URL"; then
              echo "Webhook succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Webhook attempt ${attempt} failed."
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Retrying in ${wait_seconds}s..."
              sleep "$wait_seconds"
              wait_seconds=$((wait_seconds * 2))
              [ "$wait_seconds" -gt 120 ] && wait_seconds=120
            fi
          done

          echo "Webhook failed after ${MAX_ATTEMPTS} attempts."
          exit 1
