name: CI Next.js site

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version for build
        type: string
        default: "22"
      build_env_json:
        description: Optional JSON object of env vars for the build step
        type: string
        default: ""
      run_smoke_tests:
        description: Run Playwright smoke tests against the static export
        type: boolean
        default: false
      serve_port:
        description: Port for serving the static export during smoke tests
        type: string
        default: "4173"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Apply build environment
        if: inputs.build_env_json != ''
        run: |
          echo '${{ inputs.build_env_json }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Smoke runs in this job (not a separate one) so the static export never
      # has to be uploaded as an artifact — that avoids the Actions storage
      # quota entirely on the private Free plan.
      - name: Install Playwright browsers
        if: inputs.run_smoke_tests
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        if: inputs.run_smoke_tests
        env:
          SMOKE_BASE_URL: http://127.0.0.1:${{ inputs.serve_port }}
        run: |
          npx serve out -l ${{ inputs.serve_port }} &
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${{ inputs.serve_port }}/" >/dev/null; then
              break
            fi
            sleep 1
          done
          npx playwright test
